<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="data:,">
  <title>Manic Miner XR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="stage">
    <canvas id="spectrum" width="256" height="192" aria-label="Manic Miner"></canvas>
  </main>
  <p id="status" aria-live="polite">Loading original game…</p>
  <button id="sound" type="button">ENABLE SOUND</button>
  <div id="touch" aria-hidden="true">
    <button data-key="10">LEFT</button><button data-key="25">RIGHT</button><button data-key="35">JUMP</button><button data-key="30">START</button>
  </div>
  <script type="module">
    const response=await fetch(`./version.json?cache=${Date.now()}`,{cache:"no-store"});
    const version=response.ok?(await response.text()).trim():"dev";
    document.querySelector('link[rel="stylesheet"]').href=`styles.css?v=${encodeURIComponent(version)}`;
    await import(`./src/main.js?v=${encodeURIComponent(version)}`);
  </script>
</body>
</html>
